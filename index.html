<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />

    <!-- Critical performance hints -->
    <meta name="theme-color" content="#0A0A0E" />
    <meta name="color-scheme" content="dark light" />

    <title>Ravi Hareeshkar – Digital Architect</title>

    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Preconnect with crossorigin for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optimized font loading with display=swap — these are the fonts actually referenced
         by --font-display/--font-body/--font-tech (src/index.css) and SignatureField.jsx.
         Loading them here, in parallel with the initial HTML, replaces a component-level
         @import that was chaining page → <style> parse → @import fetch → font fetch, which
         was delaying the hero title's paint (Lighthouse traced ~4.2s of render delay to it). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400&family=Dancing+Script:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preload critical assets -->
    <link rel="modulepreload" href="src/main.jsx" />
  </head>
  <body style="will-change: scroll-position">
    <!-- GPU hint for scroll -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
